
# 針對 Threads 的雜訊字符 (ASCII / 短字串)
noisy_ascii:
  - "http"
  - "https"
  - "com"
  - "www"
  - "igshid"
  - "jpg"
  - "png"
  - "bot"
  - "thread"
  - "threads"
  - "scontent"
  - "cdninstagram"
  - "translated"
  - "google"
  - "translate"

# 包含這些關鍵詞的行，整行丟棄
drop_patterns:
  - "查看更多"
  - "翻譯年糕"
  - "顯示更多"
  - "回覆"
  - "轉發"
  - "引用"
  - "檢舉"
  - "隱藏"
  - "封鎖"
  - "限制"
  - "關於"
  - "使用條款"
  - "隱私權政策"
  - "Cookie"
  - "Meta"
  - "Instagram"
  - "登入"
  - "註冊"
  - "追蹤"
  - "粉絲"
  # --- 麻將/賭博招募帖 ---
  - "缺[一二三1-3]"
  - "-[1-3]\\s"
  - "🀄"
  - "滿開"
  - "現主時"
  - "自家場"
  # --- 垃圾留言機器人 ---
  - "you can DM me on tg"
  - "Anyone wants to chat"

# 忽略的特定Token (新增)
ignore_tokens:
  - "劇透"
  - "查看更多"
  - "開啟"
  - "顯示"
  - "更多"
  - "內容"
  - "翻譯"

# 詞性過濾 (新增)
# n: 名詞, v: 動詞, nr: 人名, ns: 地名, nt: 機構名, nz: 其他專名, vn: 動名詞
pos_filters:
  - "n"
  - "v"
  - "nr"
  - "ns"
  - "nt"
  - "nz"
  - "vn"

# 必須強制丟棄的促銷/無意義字 (regex)
promo_ascii:
  - '^\d+[\w]*$'   # 純數字或數字開頭
  - '^[a-f0-9]{10,}$' # 長亂碼
  - '^[0-9]+(m|k)$'  # 10k, 5m

# 詞組探勘時，若包含這些 regex 就丟棄
phrase_drop_regex:
  - '^\d+'
  - '^[a-zA-Z\W]+$'  # 純英文或符號

